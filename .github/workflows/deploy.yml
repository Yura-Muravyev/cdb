name: Deploy Server

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /data/docker/firmware-hub
            git pull
            cd server
            docker build --no-cache -t firmware-hub-server .
            docker stop firmware-hub-server || true
            docker rm firmware-hub-server || true
            docker run -d \
              --name firmware-hub-server \
              --restart unless-stopped \
              -p 3000:3000 \
              -v /data/firmware-storage:/data/storage \
              --env-file /data/docker/firmware-hub/.env \
              --network firmware-hub-net \
              firmware-hub-server
